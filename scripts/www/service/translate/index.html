<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本翻译服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-count {
            text-align: right;
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .char-count.warning {
            color: #e74c3c;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .source-lang {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
        }

        .result-text {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #333;
            line-height: 1.6;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading.active {
            display: block;
        }

        .copy-btn {
            background: #f0f0f0;
            color: #333;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>文本翻译服务</h1>
        
        <div class="form-group">
            <label for="targetLang">目标语言</label>
            <select id="targetLang">
                <option value="zh">中文</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="fr">法语</option>
                <option value="de">德语</option>
                <option value="ru">俄语</option>
                <option value="ar">阿拉伯语</option>
                <option value="es">西班牙语</option>
                <option value="pt">葡萄牙语</option>
                <option value="it">意大利语</option>
                <option value="th">泰语</option>
                <option value="vi">越南语</option>
            </select>
        </div>

        <div class="form-group">
            <label for="sourceText">待翻译文本</label>
            <textarea id="sourceText" placeholder="请输入要翻译的文本（最多3000字符）..."></textarea>
            <div class="char-count" id="charCount">0 / 3000</div>
        </div>

        <button id="translateBtn" onclick="translateText()">翻译</button>

        <div class="loading" id="loading">翻译中...</div>

        <div class="result-section" id="resultSection" style="display: none;">
            <div class="result-header">
                <span class="source-lang" id="sourceLang"></span>
                <button class="copy-btn" onclick="copyResult()">复制结果</button>
            </div>
            <div class="result-text" id="resultText"></div>
        </div>

        <div class="error" id="errorBox" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'https://shturl.cc/8bDtTrZch1QuJlZfa4Lh';
        const MAX_CHARS = 3000;

        const sourceText = document.getElementById('sourceText');
        const charCount = document.getElementById('charCount');
        const translateBtn = document.getElementById('translateBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultText = document.getElementById('resultText');
        const sourceLang = document.getElementById('sourceLang');
        const errorBox = document.getElementById('errorBox');

        // 字符计数
        sourceText.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = `${length} / ${MAX_CHARS}`;
            
            if (length > MAX_CHARS) {
                charCount.classList.add('warning');
                this.value = this.value.substring(0, MAX_CHARS);
            } else {
                charCount.classList.remove('warning');
            }
        });

        async function translateText() {
            const text = sourceText.value.trim();
            const toLang = document.getElementById('targetLang').value;

            if (!text) {
                showError('请输入要翻译的文本');
                return;
            }

            if (text.length > MAX_CHARS) {
                showError(`文本超过${MAX_CHARS}字符限制`);
                return;
            }

            // 显示加载状态
            translateBtn.disabled = true;
            loading.classList.add('active');
            resultSection.style.display = 'none';
            errorBox.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}?to_lang=${encodeURIComponent(toLang)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (response.ok) {
                    // 显示结果
                    sourceLang.textContent = `源语言: ${getLanguageName(data.source_lang)}`;
                    resultText.textContent = data.translated_text;
                    resultSection.style.display = 'block';
                } else {
                    // 显示错误
                    if (data.error === 'INVALID_ARGUMENT') {
                        showError('请求参数错误：缺少必要参数或格式错误');
                    } else if (data.error === 'TRANSLATION_FAILED') {
                        showError('翻译失败：服务异常，请稍后重试');
                    } else {
                        showError(`翻译失败: ${data.message || '未知错误'}`);
                    }
                }
            } catch (error) {
                console.error('Translation error:', error);
                if (error.message === 'Failed to fetch') {
                    showError('网络请求失败：可能是跨域限制或网络连接问题。\n\n解决方案：\n1. 使用本地服务器运行此页面\n2. 或在终端执行: npx serve "' + window.location.pathname.replace(/\/[^/]+$/, '') + '"');
                } else {
                    showError(`网络错误: ${error.message}`);
                }
            } finally {
                translateBtn.disabled = false;
                loading.classList.remove('active');
            }
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
        }

        function getLanguageName(code) {
            const langMap = {
                'zh': '中文',
                'en': '英语',
                'ja': '日语',
                'ko': '韩语',
                'fr': '法语',
                'de': '德语',
                'ru': '俄语',
                'ar': '阿拉伯语',
                'es': '西班牙语',
                'pt': '葡萄牙语',
                'it': '意大利语',
                'th': '泰语',
                'vi': '越南语'
            };
            return langMap[code] || code;
        }

        function copyResult() {
            const text = resultText.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '已复制!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                showError('复制失败');
            });
        }

        // 支持 Enter 键翻译
        sourceText.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                translateText();
            }
        });
    </script>
</body>
</html>
