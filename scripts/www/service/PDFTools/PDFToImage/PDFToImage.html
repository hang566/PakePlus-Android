<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF转图片工具 - 增强版</title>
  <script src="../lib/pdf.min.js"></script>
  <script src="../lib/jszip.min.js"></script>
  <script src="../lib/FileSaver.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 24px;
      max-width: 1300px;
      margin: 0 auto;
    }
    .container {
      background: #fff;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 2px 18px rgba(0,0,0,0.07);
    }
    h1 {
      text-align: center;
      color: #1f2937;
      margin-bottom: 26px;
      font-size: 26px;
    }
    .upload-area {
      border: 2px dashed #3b82f6;
      border-radius: 10px;
      padding: 55px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 22px;
    }
    .upload-area:hover {
      background: #eff6ff;
    }
    .upload-area input {
      display: none;
    }
    .upload-text {
      color: #3b82f6;
      font-size: 18px;
    }
    .control-group {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .group-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
    }
    .control-row {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .control-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    label {
      color: #4b5563;
      font-size: 14px;
    }
    input[type="number"], input[type="text"], select, input[type="color"] {
      padding: 6px 9px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
    }
    input[type="number"] {
      width: 75px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    #renderBtn {
      background: #3b82f6;
      color: #fff;
    }
    #downloadAll {
      background: #10b981;
      color: #fff;
    }
    #clearBtn {
      background: #ef4444;
      color: #fff;
    }
    .status {
      margin: 14px 0;
      color: #6b7280;
      min-height: 20px;
    }
    .preview-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }
    .page-card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }
    .page-card img {
      width: 100%;
      display: block;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .page-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .page-name {
      font-size: 13px;
      color: #4b5563;
    }
    .single-down-btn {
      background: #6366f1;
      color: white;
      padding: 4px 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
    <div id="nav"></div>
<div class="container">
  <h1>PDF转图片工具（增强版：水印/裁剪/旋转/页码范围）</h1>

  <!-- 上传区域 -->
  <div class="upload-area" id="uploadBox">
    <input type="file" id="pdfFile" accept=".pdf">
    <div class="upload-text">点击或拖拽上传PDF文件</div>
  </div>

  <!-- 基础转换设置 -->
  <div class="control-group">
    <div class="group-title">基础转换参数</div>
    <div class="control-row">
      <div class="control-item">
        <label>缩放倍数：</label>
        <input type="number" id="scale" value="2" min="0.5" max="5" step="0.5">
      </div>
      <div class="control-item">
        <label>图片格式：</label>
        <select id="imgType">
          <option value="png">PNG（无损）</option>
          <option value="jpeg">JPG（压缩）</option>
        </select>
      </div>
      <div class="control-item">
        <label>JPG质量：</label>
        <input type="number" id="quality" value="0.9" min="0.1" max="1" step="0.1">
      </div>
      <div class="control-item">
        <label>旋转角度：</label>
        <select id="rotateDeg">
          <option value="0">0° 不旋转</option>
          <option value="90">90°</option>
          <option value="180">180°</option>
          <option value="270">270°</option>
        </select>
      </div>
    </div>
    <div class="control-row">
      <div class="control-item">
        <label>裁剪宽(px)：留空不裁剪</label>
        <input type="number" id="cropW" placeholder="宽度">
      </div>
      <div class="control-item">
        <label>裁剪高(px)：留空不裁剪</label>
        <input type="number" id="cropH" placeholder="高度">
      </div>
      <div class="control-item">
        <label>起始页码：</label>
        <input type="number" id="startPage" value="1" min="1">
      </div>
      <div class="control-item">
        <label>结束页码：</label>
        <input type="number" id="endPage" value="999">
      </div>
    </div>
  </div>

  <!-- 水印设置 -->
  <div class="control-group">
    <div class="group-title">文字水印设置（留空不加水印）</div>
    <div class="control-row">
      <div class="control-item">
        <label>水印文字：</label>
        <input type="text" id="waterText" placeholder="输入水印文字">
      </div>
      <div class="control-item">
        <label>水印字号：</label>
        <input type="number" id="waterSize" value="32" min="10" max="100">
      </div>
      <div class="control-item">
        <label>水印颜色：</label>
        <input type="color" id="waterColor" value="#888888">
      </div>
      <div class="control-item">
        <label>透明度(0-1)：</label>
        <input type="number" id="waterAlpha" value="0.3" min="0" max="1" step="0.1">
      </div>
      <div class="control-item">
        <label>倾斜角度：</label>
        <input type="number" id="waterRotate" value="-30" min="-90" max="90">
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="control-row">
    <button id="renderBtn">转换指定页码</button>
    <button id="downloadAll">打包全部图片ZIP</button>
    <button id="clearBtn">清空全部</button>
  </div>

  <div class="status" id="statusText">等待上传PDF...</div>

  <!-- 预览区域 -->
  <div class="preview-wrap" id="previewBox"></div>
</div>

<script>
  // 配置PDF.js worker - 使用绝对路径
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  
  // 获取当前页面路径，构建worker绝对路径
  const currentPath = window.location.pathname;
  const pdfToolsPath = currentPath.substring(0, currentPath.lastIndexOf('/PDFToImage'));
  const workerPath = pdfToolsPath + '/lib/pdf.worker.min.js';
  
  pdfjsLib.GlobalWorkerOptions.workerSrc = workerPath;
  
  console.log('PDF.js版本:', pdfjsLib.version);
  console.log('Worker路径:', pdfjsLib.GlobalWorkerOptions.workerSrc);

  // DOM 元素
  const uploadBox = document.getElementById('uploadBox');
  const pdfFileInput = document.getElementById('pdfFile');
  const renderBtn = document.getElementById('renderBtn');
  const downloadAllBtn = document.getElementById('downloadAll');
  const clearBtn = document.getElementById('clearBtn');
  const statusText = document.getElementById('statusText');
  const previewBox = document.getElementById('previewBox');

  // 转换参数输入框
  const scaleInput = document.getElementById('scale');
  const imgTypeSelect = document.getElementById('imgType');
  const qualityInput = document.getElementById('quality');
  const rotateDegSelect = document.getElementById('rotateDeg');
  const cropWInput = document.getElementById('cropW');
  const cropHInput = document.getElementById('cropH');
  const startPageInput = document.getElementById('startPage');
  const endPageInput = document.getElementById('endPage');

  // 水印参数
  const waterTextInput = document.getElementById('waterText');
  const waterSizeInput = document.getElementById('waterSize');
  const waterColorInput = document.getElementById('waterColor');
  const waterAlphaInput = document.getElementById('waterAlpha');
  const waterRotateInput = document.getElementById('waterRotate');

  // 全局缓存
  let pdfDoc = null;
  let pageImages = [];

  // 上传拖拽逻辑
  uploadBox.addEventListener('click', () => pdfFileInput.click());
  uploadBox.addEventListener('dragover', e => {
    e.preventDefault();
    uploadBox.style.background = '#eff6ff';
  });
  uploadBox.addEventListener('dragleave', () => uploadBox.style.background = '');
  uploadBox.addEventListener('drop', e => {
    e.preventDefault();
    uploadBox.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file?.type === 'application/pdf') loadPdf(file);
    else setStatus('请上传合法PDF文件');
  });
  pdfFileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadPdf(file);
  });

  // 加载PDF文件
  async function loadPdf(file) {
    clearAll();
    setStatus('正在读取PDF...');
    const reader = new FileReader();
    reader.readAsArrayBuffer(file);
    reader.onload = async ev => {
      try {
        pdfDoc = await pdfjsLib.getDocument(ev.target.result).promise;
        endPageInput.value = pdfDoc.numPages;
        setStatus(`PDF加载完成，共${pdfDoc.numPages}页，设置页码范围后转换`);
      } catch (err) {
        setStatus('PDF解析失败：' + err.message);
        console.error(err);
      }
    };
  }

  // 转换按钮
  renderBtn.addEventListener('click', async () => {
    if (!pdfDoc) return setStatus('请先上传PDF');
    pageImages = [];
    previewBox.innerHTML = '';

    const totalPages = pdfDoc.numPages;
    let start = Number(startPageInput.value);
    let end = Number(endPageInput.value);
    const scale = Number(scaleInput.value);
    const imgType = imgTypeSelect.value;
    const quality = Number(qualityInput.value);
    const rotate = Number(rotateDegSelect.value);
    const cropW = Number(cropWInput.value) || 0;
    const cropH = Number(cropHInput.value) || 0;

    // 页码校验
    start = Math.max(1, start);
    end = Math.min(totalPages, end);
    if (start > end) return setStatus('起始页码不能大于结束页码');

    for (let pageNum = start; pageNum <= end; pageNum++) {
      setStatus(`转换中 ${pageNum}/${end}`);
      // 渲染PDF页面到画布
      const pageCanvas = await renderPdfPage(pdfDoc, pageNum, scale);
      // 旋转画布
      const rotatedCanvas = rotateCanvas(pageCanvas, rotate);
      // 裁剪画布
      const cropCanvas = cropCanvasImg(rotatedCanvas, cropW, cropH);
      // 添加水印
      const finalCanvas = addWatermark(cropCanvas);
      // 转Blob
      const blob = await canvasToBlob(finalCanvas, imgType, quality);
      const fileName = `page_${String(pageNum).padStart(3, '0')}.${imgType}`;
      pageImages.push({ name: fileName, blob });
      // 渲染预览卡片（带单页下载按钮）
      createPreviewCard(fileName, blob, pageNum);
    }
    setStatus(`转换完成！共${pageImages.length}张图片`);
  });

  // 渲染单页PDF到Canvas
  async function renderPdfPage(doc, pageNo, scale) {
    const page = await doc.getPage(pageNo);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: ctx, viewport }).promise;
    return canvas;
  }

  // 画布旋转
  function rotateCanvas(sourceCanvas, deg) {
    if (deg === 0) return sourceCanvas;
    const rad = deg * Math.PI / 180;
    const srcW = sourceCanvas.width;
    const srcH = sourceCanvas.height;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    // 旋转后宽高交换
    if (deg === 90 || deg === 270) {
      canvas.width = srcH;
      canvas.height = srcW;
    } else {
      canvas.width = srcW;
      canvas.height = srcH;
    }
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rad);
    ctx.drawImage(sourceCanvas, -srcW / 2, -srcH / 2);
    return canvas;
  }

  // 画布裁剪
  function cropCanvasImg(sourceCanvas, cw, ch) {
    if (!cw || !ch) return sourceCanvas;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = Math.min(cw, sourceCanvas.width);
    canvas.height = Math.min(ch, sourceCanvas.height);
    ctx.drawImage(sourceCanvas, 0, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
    return canvas;
  }

  // 添加全屏斜水印
  function addWatermark(sourceCanvas) {
    const waterText = waterTextInput.value.trim();
    if (!waterText) return sourceCanvas;
    const fontSize = Number(waterSizeInput.value);
    const color = waterColorInput.value;
    const alpha = Number(waterAlphaInput.value);
    const wRotate = Number(waterRotateInput.value);

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = sourceCanvas.width;
    canvas.height = sourceCanvas.height;
    // 先绘制原图
    ctx.drawImage(sourceCanvas, 0, 0);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.font = `${fontSize}px sans-serif`;
    const rad = wRotate * Math.PI / 180;

    // 平铺水印
    const stepX = fontSize * 4;
    const stepY = fontSize * 3;
    for (let y = -stepY; y < canvas.height + stepY; y += stepY) {
      for (let x = -stepX; x < canvas.width + stepX; x += stepX) {
        ctx.translate(x, y);
        ctx.rotate(rad);
        ctx.fillText(waterText, 0, 0);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }
    }
    ctx.restore();
    return canvas;
  }

  // Canvas转Blob
  function canvasToBlob(canvas, type, quality) {
    return new Promise(resolve => canvas.toBlob(resolve, `image/${type}`, quality));
  }

  // 创建预览卡片+单页下载按钮
  function createPreviewCard(name, blob, pageNum) {
    const card = document.createElement('div');
    card.className = 'page-card';
    const url = URL.createObjectURL(blob);
    card.innerHTML = `
      <img src="${url}" alt="page${pageNum}">
      <div class="page-info">
        <span class="page-name">${name}</span>
        <button class="single-down-btn">下载本页</button>
      </div>
    `;
    // 单页下载点击事件
    card.querySelector('.single-down-btn').onclick = () => saveAs(blob, name);
    previewBox.appendChild(card);
  }

  // 打包全部下载
  downloadAllBtn.addEventListener('click', async () => {
    if (!pageImages.length) return setStatus('无转换图片');
    setStatus('正在打包ZIP...');
    const zip = new JSZip();
    pageImages.forEach(item => zip.file(item.name, item.blob));
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    saveAs(zipBlob, 'pdf_images.zip');
    setStatus('压缩包已开始下载');
  });

  // 清空所有
  function clearAll() {
    pdfDoc = null;
    pageImages = [];
    previewBox.innerHTML = '';
    pdfFileInput.value = '';
    startPageInput.value = 1;
    endPageInput.value = 999;
    setStatus('等待上传PDF...');
  }
  clearBtn.addEventListener('click', clearAll);

  // 更新状态文字
  function setStatus(text) {
    statusText.textContent = text;
  }
</script>
<script src="../../../js/nav.js"></script>
</body>
</html>
