<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增强版PDF加水印工具</title>
    <script src="../lib/tailwind.min.js"></script>
    <script src="../lib/pdf-lib.min.js"></script>
    <script src="../lib/pdf.min.js"></script>
    <link rel="stylesheet" href="../lib/font-awesome.min.css">
    <script>
        // 配置PDF.js worker - 使用绝对路径
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        
        // 获取当前页面路径，构建worker绝对路径
        const currentPath = window.location.pathname;
        const pdfToolsPath = currentPath.substring(0, currentPath.lastIndexOf('/PDFWatermarking'));
        const workerPath = pdfToolsPath + '/lib/pdf.worker.min.js';
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = workerPath;
        
        console.log('PDF.js版本:', pdfjsLib.version);
        console.log('Worker路径:', pdfjsLib.GlobalWorkerOptions.workerSrc);
        
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>
    <style>
        .preview-canvas { border:1px solid #ddd; max-height:300px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div id="nav"></div>
<div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-10">
    <h1 class="text-[clamp(1.5rem,3vw,2.2rem)] font-bold text-gray-800 mb-6 text-center">
        <i class="fa fa-file-pdf-o text-primary mr-2"></i>增强版PDF水印工具
    </h1>

    <!-- 批量上传区域 -->
    <div id="uploadBox" class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center hover:border-primary transition-colors mb-6 cursor-pointer">
        <i class="fa fa-cloud-upload text-5xl text-gray-400 mb-3"></i>
        <p class="text-gray-600">点击/拖拽批量上传PDF文件</p>
        <input type="file" id="pdfFileInput" accept=".pdf" multiple class="hidden">
    </div>
    <div id="fileListWrap" class="hidden mb-4">
        <p class="font-semibold mb-2">已上传文件列表：</p>
        <div id="fileList" class="space-y-1 max-h-40 overflow-y-auto"></div>
    </div>

    <!-- PDF首页预览 -->
    <div id="previewWrap" class="hidden mb-6">
        <p class="font-semibold mb-2">第一页预览：</p>
        <canvas id="previewCanvas" class="preview-canvas"></canvas>
    </div>

    <!-- 水印全局配置 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 p-4 bg-gray-50 rounded-lg">
        <div>
            <label class="block text-gray-700 mb-1">水印布局</label>
            <select id="waterLayout" class="w-full border rounded px-3 py-2">
                <option value="tile">平铺水印</option>
                <option value="center">单张居中水印</option>
            </select>
        </div>
        <div>
            <label class="block text-gray-700 mb-1">水印层级</label>
            <select id="waterLayer" class="w-full border rounded px-3 py-2">
                <option value="top">顶层（覆盖原文）</option>
                <option value="bottom">底层（衬在文字下）</option>
            </select>
        </div>
        <div>
            <label class="block text-gray-700 mb-1">生效页面范围</label>
            <input id="pageRange" value="" placeholder="例:1-3 或 1,3,5" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">X坐标偏移</label>
            <input type="number" id="offsetX" value="0" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">Y坐标偏移</label>
            <input type="number" id="offsetY" value="0" class="w-full border rounded px-3 py-2">
        </div>
    </div>

    <!-- 水印类型切换 -->
    <div class="flex gap-4 mb-6">
        <button id="textWatermarkBtn" class="px-5 py-2 rounded bg-primary text-white">文字水印</button>
        <button id="imgWatermarkBtn" class="px-5 py-2 rounded bg-gray-200 text-gray-700">图片水印</button>
    </div>

    <!-- 文字水印面板 -->
    <div id="textPanel" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div>
            <label class="block text-gray-700 mb-1">水印文字</label>
            <input type="text" id="waterText" value="内部资料 禁止外传" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">字体大小</label>
            <input type="number" id="fontSize" value="40" min="10" max="120" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">文字颜色</label>
            <input type="color" id="fontColor" value="#888888" class="w-full h-10 border rounded">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">透明度(0-1)</label>
            <input type="number" id="opacity" value="0.3" step="0.05" min="0.05" max="1" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">旋转角度</label>
            <input type="number" id="rotateDeg" value="-45" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-gray-700 mb-1">平铺间距</label>
            <input type="number" id="gapSize" value="180" min="80" class="w-full border rounded px-3 py-2">
        </div>
        <div class="md:col-span-2">
            <label class="block text-gray-700 mb-1">自定义字体文件(.ttf/.otf，不选则默认Helvetica)</label>
            <input type="file" id="fontUpload" accept=".ttf,.otf" class="w-full border rounded px-3 py-2">
        </div>
    </div>

    <!-- 图片水印面板 -->
    <div id="imgPanel" class="hidden mb-6">
        <label class="block text-gray-700 mb-2">上传水印图片</label>
        <input type="file" id="imgInput" accept="image/*" class="mb-3">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-gray-700 mb-1">图片宽度</label>
                <input type="number" id="imgW" value="160" min="40" class="w-full border rounded px-3 py-2">
            </div>
            <div>
                <label class="block text-gray-700 mb-1">透明度</label>
                <input type="number" id="imgOpacity" value="0.25" step="0.05" min="0.05" max="1" class="w-full border rounded px-3 py-2">
            </div>
            <div>
                <label class="block text-gray-700 mb-1">平铺间距</label>
                <input type="number" id="imgGap" value="200" min="80" class="w-full border rounded px-3 py-2">
            </div>
        </div>
    </div>

    <!-- 操作按钮 -->
    <button id="genBtn" class="w-full py-3 bg-primary text-white rounded-lg text-lg font-medium hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed">
        <i class="fa fa-magic mr-2"></i>批量生成带水印PDF并下载
    </button>
    <p id="statusText" class="mt-4 text-center text-gray-500"></p>
</div>

<script>
// DOM
const uploadBox = document.getElementById('uploadBox');
const pdfInput = document.getElementById('pdfFileInput');
const fileListWrap = document.getElementById('fileListWrap');
const fileList = document.getElementById('fileList');
const previewWrap = document.getElementById('previewWrap');
const previewCanvas = document.getElementById('previewCanvas');
const ctx = previewCanvas.getContext('2d');

const textBtn = document.getElementById('textWatermarkBtn');
const imgBtn = document.getElementById('imgWatermarkBtn');
const textPanel = document.getElementById('textPanel');
const imgPanel = document.getElementById('imgPanel');
const genBtn = document.getElementById('genBtn');
const statusText = document.getElementById('statusText');
const imgInput = document.getElementById('imgInput');
const fontUpload = document.getElementById('fontUpload');

const waterLayout = document.getElementById('waterLayout');
const waterLayer = document.getElementById('waterLayer');
const pageRange = document.getElementById('pageRange');
const offsetX = document.getElementById('offsetX');
const offsetY = document.getElementById('offsetY');

// 全局变量
let pdfFileArr = [];
let waterImgBuffer = null;
let customFontBytes = null;
let useTextWater = true;

// 切换水印类型
textBtn.onclick = () => {
    useTextWater = true;
    textPanel.classList.remove('hidden');
    imgPanel.classList.add('hidden');
    textBtn.className = 'px-5 py-2 rounded bg-primary text-white';
    imgBtn.className = 'px-5 py-2 rounded bg-gray-200 text-gray-700';
}
imgBtn.onclick = () => {
    useTextWater = false;
    textPanel.classList.add('hidden');
    imgPanel.classList.remove('hidden');
    imgBtn.className = 'px-5 py-2 rounded bg-primary text-white';
    textBtn.className = 'px-5 py-2 rounded bg-gray-200 text-gray-700';
}

// 上传PDF 批量处理
uploadBox.onclick = () => pdfInput.click();
uploadBox.ondragover = e => e.preventDefault();
uploadBox.ondrop = e => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.pdf'));
    handlePdfFiles(files);
}
pdfInput.onchange = () => {
    const files = Array.from(pdfInput.files);
    handlePdfFiles(files);
}

// 加载PDF列表+预览第一份文件
async function handlePdfFiles(files){
    if(!files.length) return;
    pdfFileArr = [...pdfFileArr, ...files];
    fileListWrap.classList.remove('hidden');
    fileList.innerHTML = '';
    pdfFileArr.forEach((f,i)=>{
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-gray-50 px-2 py-1 rounded';
        div.innerHTML = `<span>${f.name}</span><button data-i="${i}" class="del text-red-500 px-2">删除</button>`;
        fileList.appendChild(div);
    })
    // 删除文件
    document.querySelectorAll('.del').forEach(btn=>{
        btn.onclick = ()=>{
            const idx = Number(btn.dataset.i);
            pdfFileArr.splice(idx,1);
            handlePdfFiles([]);
            if(!pdfFileArr.length) previewWrap.classList.add('hidden');
        }
    })
    // 渲染第一个PDF预览
    renderPdfPreview(pdfFileArr[0]);
}

// PDF首页预览(pdfjs)
async function renderPdfPreview(file){
    previewWrap.classList.remove('hidden');
    const arrayBuf = await file.arrayBuffer();
    const pdfDoc = await pdfjsLib.getDocument(arrayBuf).promise;
    const page = await pdfDoc.getPage(1);
    const scale = 0.5;
    const viewport = page.getViewport({scale});
    previewCanvas.width = viewport.width;
    previewCanvas.height = viewport.height;
    await page.render({canvasContext: ctx, viewport}).promise;
}

// 水印图片上传
imgInput.onchange = async ()=>{
    const file = imgInput.files[0];
    if(!file) return;
    waterImgBuffer = new Uint8Array(await file.arrayBuffer());
    setStatus('水印图片加载完成','green');
}

// 自定义字体上传
fontUpload.onchange = async ()=>{
    const file = fontUpload.files[0];
    if(!file) return;
    customFontBytes = new Uint8Array(await file.arrayBuffer());
    setStatus('自定义字体加载成功','green');
}

// 解析页面范围字符串
function parsePageRange(totalPages, rangeStr){
    if(!rangeStr.trim()) return Array.from({length:totalPages},(_,i)=>i);
    const targetIdx = new Set();
    const parts = rangeStr.split(',');
    for(let p of parts){
        p = p.trim();
        if(p.includes('-')){
            const [s,e] = p.split('-').map(Number);
            for(let i=s;i<=e;i++) if(i>=1&&i<=totalPages) targetIdx.add(i-1);
        }else{
            const n = Number(p);
            if(n>=1&&n<=totalPages) targetIdx.add(n-1);
        }
    }
    return Array.from(targetIdx);
}

// 状态提示
function setStatus(text, color='gray'){
    statusText.textContent = text;
    const map = {gray:'text-gray-500',red:'text-red-500',green:'text-green-500',blue:'text-blue-500'};
    statusText.className = `mt-4 text-center ${map[color]}`;
}

// 主生成逻辑
genBtn.onclick = async ()=>{
    if(!pdfFileArr.length) return setStatus('请先上传PDF文件','red');
    if(!useTextWater && !waterImgBuffer) return setStatus('图片水印需上传图片','red');

    genBtn.disabled = true;
    setStatus('开始批量处理PDF...','blue');
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    try{
        for(let file of pdfFileArr){
            setStatus(`正在处理：${file.name}`,'blue');
            const fileBuf = new Uint8Array(await file.arrayBuffer());
            const pdfDoc = await PDFDocument.load(fileBuf);
            const pages = pdfDoc.getPages();
            const total = pages.length;
            const targetIndexes = parsePageRange(total, pageRange.value);
            const layout = waterLayout.value;
            const layer = waterLayer.value;
            const offX = Number(offsetX.value);
            const offY = Number(offsetY.value);

            // 文字水印绘制
            if(useTextWater){
                const wText = document.getElementById('waterText').value;
                const fSize = Number(document.getElementById('fontSize').value);
                const op = Number(document.getElementById('opacity').value);
                const rot = Number(document.getElementById('rotateDeg').value);
                const gap = Number(document.getElementById('gapSize').value);
                const hex = document.getElementById('fontColor').value;
                const r = parseInt(hex.slice(1,3),16)/255;
                const g = parseInt(hex.slice(3,5),16)/255;
                const b = parseInt(hex.slice(5,7),16)/255;

                // 嵌入字体
                let font;
                if(customFontBytes){
                    font = await pdfDoc.embedFont(customFontBytes);
                }else{
                    font = await pdfDoc.embedFont(StandardFonts.Helvetica);
                }

                for(let pageIdx of targetIndexes){
                    const page = pages[pageIdx];
                    const pw = page.getWidth();
                    const ph = page.getHeight();
                    const drawOpt = {
                        font, size:fSize, color:rgb(r,g,b), opacity:op,
                        rotate:{angle:rot, type:'degrees'}
                    };

                    // 底层水印先绘制
                    if(layer === 'bottom') page.pushOperators(pdfDoc.formXObject('q'));

                    if(layout === 'center'){
                        const textW = font.widthOfTextAtSize(wText, fSize);
                        const cx = pw/2 - textW/2 + offX;
                        const cy = ph/2 - fSize/2 + offY;
                        page.drawText(wText, {...drawOpt, x:cx, y:cy});
                    }else{
                        // 平铺
                        for(let x=-gap; x < pw+gap; x+=gap){
                            for(let y=-gap; y < ph+gap; y+=gap){
                                page.drawText(wText, {...drawOpt, x:x+offX, y:y+offY});
                            }
                        }
                    }
                    if(layer === 'bottom') page.pushOperators(pdfDoc.formXObject('Q'));
                }
            }else{
                // 图片水印
                const iw = Number(document.getElementById('imgW').value);
                const iop = Number(document.getElementById('imgOpacity').value);
                const igap = Number(document.getElementById('imgGap').value);
                const img = await pdfDoc.embedPng(waterImgBuffer);
                const ih = iw * img.height / img.width;

                for(let pageIdx of targetIndexes){
                    const page = pages[pageIdx];
                    const pw = page.getWidth();
                    const ph = page.getHeight();

                    if(layer === 'bottom') page.pushOperators(pdfDoc.formXObject('q'));

                    if(layout === 'center'){
                        const cx = pw/2 - iw/2 + offX;
                        const cy = ph/2 - ih/2 + offY;
                        page.drawImage(img, {x:cx, y:cy, width:iw, height:ih, opacity:iop});
                    }else{
                        for(let x=-igap; x < pw+igap; x+=igap){
                            for(let y=-igap; y < ph+igap; y+=igap){
                                page.drawImage(img, {x:x+offX, y:y+offY, width:iw, height:ih, opacity:iop});
                            }
                        }
                    }
                    if(layer === 'bottom') page.pushOperators(pdfDoc.formXObject('Q'));
                }
            }

            // 导出单文件
            const outBytes = await pdfDoc.save();
            const blob = new Blob([outBytes], {type:'application/pdf'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const baseName = file.name.replace(/\.pdf$/i,'');
            a.download = `${baseName}_加水印.pdf`;
            a.click();
            URL.revokeObjectURL(a.href);
        }
        setStatus('全部PDF处理完成，已自动下载','green');
    }catch(err){
        console.error(err);
        setStatus('处理失败：'+err.message,'red');
    }finally{
        genBtn.disabled = false;
    }
}
</script>
<script src="../../../js/nav.js"></script>
</body>
</html>
