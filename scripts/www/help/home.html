<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮助中心 - 数据管理</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        h1 {
            font-size: 20px;
            margin: 0 0 20px 0;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }
        .section {
            margin-bottom: 24px;
        }
        .section-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-json {
            background: #2563eb;
            color: white;
        }
        .btn-xml {
            background: #16a34a;
            color: white;
        }
        .btn-csv {
            background: #f59e0b;
            color: white;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .file-input {
            display: none;
        }
        .file-label {
            display: inline-block;
            padding: 8px 16px;
            background: #6366f1;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .file-label:hover {
            background: #4f46e5;
        }
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
        }
        .toast.success {
            background: #16a34a;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.warning {
            background: #f59e0b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>数据管理</h1>
        
        <div class="section">
            <div class="section-title">导出数据</div>
            <div class="btn-group">
                <button class="btn-json" onclick="exportData('json')">JSON</button>
                <button class="btn-xml" onclick="exportData('xml')">XML</button>
                <button class="btn-csv" onclick="exportData('csv')">CSV</button>
            </div>
        </div>
        
        <hr>
        
        <div class="section">
            <div class="section-title">导入数据</div>
            <label class="file-label" for="fileInput">选择文件</label>
            <input type="file" id="fileInput" class="file-input" accept=".json,.xml,.csv" onchange="importData(event)">
        </div>
        
        <hr>
        
        <div class="section">
            <button class="btn-danger" onclick="clearAllData()">清空所有站点数据</button>
        </div>
    </div>


    <a href="text/商品数据_order_products.json"download>菜单</a>
    
    <div class="toast" id="toast"></div>

    <script>
        const PLUGIN_CENTER_KEY = 'pluginCenter';
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function getPluginData() {
            try {
                const data = localStorage.getItem(PLUGIN_CENTER_KEY);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function setPluginData(data) {
            localStorage.setItem(PLUGIN_CENTER_KEY, JSON.stringify(data));
        }

        function exportData(format) {
            const data = getPluginData();
            
            let content = '';
            let filename = '';
            let mimeType = '';
            
            switch (format) {
                case 'json':
                    content = JSON.stringify(data, null, 2);
                    filename = `plugin_data_${new Date().toISOString().slice(0, 10)}.json`;
                    mimeType = 'application/json';
                    break;
                case 'xml':
                    content = jsonToXml(data);
                    filename = `plugin_data_${new Date().toISOString().slice(0, 10)}.xml`;
                    mimeType = 'application/xml';
                    break;
                case 'csv':
                    content = jsonToCsv(data);
                    filename = `plugin_data_${new Date().toISOString().slice(0, 10)}.csv`;
                    mimeType = 'text/csv';
                    break;
            }
            
            downloadFile(content, filename, mimeType);
            showToast(`已导出 ${data.length} 条数据`);
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function jsonToXml(data) {
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
            xml += '<plugins>\n';
            
            data.forEach((item, index) => {
                xml += '  <plugin>\n';
                Object.keys(item).forEach(key => {
                    const value = item[key];
                    if (Array.isArray(value)) {
                        xml += `    <${key}>\n`;
                        value.forEach(tag => {
                            xml += `      <item>${escapeXml(tag)}</item>\n`;
                        });
                        xml += `    </${key}>\n`;
                    } else {
                        xml += `    <${key}>${escapeXml(value)}</${key}>\n`;
                    }
                });
                xml += '  </plugin>\n';
            });
            
            xml += '</plugins>';
            return xml;
        }

        function escapeXml(text) {
            if (typeof text !== 'string') text = String(text);
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function jsonToCsv(data) {
            if (!data.length) return '';
            
            const headers = [...new Set(data.flatMap(item => Object.keys(item)))];
            let csv = headers.join(',') + '\n';
            
            data.forEach(item => {
                const row = headers.map(header => {
                    const value = item[header];
                    const escaped = typeof value === 'string' ? value.replace(/"/g, '""') : value;
                    return `"${escaped || ''}"`;
                });
                csv += row.join(',') + '\n';
            });
            
            return csv;
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    let data = [];
                    const fileName = file.name.toLowerCase();
                    
                    if (fileName.endsWith('.json')) {
                        data = JSON.parse(e.target.result);
                    } else if (fileName.endsWith('.xml')) {
                        data = xmlToJson(e.target.result);
                    } else if (fileName.endsWith('.csv')) {
                        data = csvToJson(e.target.result);
                    }
                    
                    if (Array.isArray(data) && data.length > 0) {
                        setPluginData(data);
                        showToast(`成功导入 ${data.length} 条数据`);
                    } else {
                        showToast('数据格式不正确', 'error');
                    }
                } catch (error) {
                    showToast('导入失败：' + error.message, 'error');
                }
            };
            
            reader.readAsText(file);
            event.target.value = '';
        }

        function xmlToJson(xmlStr) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlStr, 'application/xml');
            const plugins = doc.querySelectorAll('plugin');
            const result = [];
            
            plugins.forEach(plugin => {
                const item = {};
                const children = plugin.children;
                for (let i = 0; i < children.length; i++) {
                    const child = children[i];
                    if (child.tagName === 'tags') {
                        const items = child.querySelectorAll('item');
                        item[child.tagName] = Array.from(items).map(item => item.textContent);
                    } else {
                        item[child.tagName] = child.textContent;
                    }
                }
                result.push(item);
            });
            
            return result;
        }

        function csvToJson(csvStr) {
            const lines = csvStr.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.replace(/"/g, ''));
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCsvLine(lines[i]);
                const item = {};
                headers.forEach((header, index) => {
                    item[header] = values[index] || '';
                });
                result.push(item);
            }
            
            return result;
        }

        function parseCsvLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    values.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current);
            
            return values.map(v => v.replace(/^"|"$/g, ''));
        }

        async function clearAllData() {
            if (!confirm('确定要清空所有站点缓存数据吗？此操作将清除浏览器中的所有站点数据，包括 localStorage、sessionStorage、IndexedDB 和 Service Worker 缓存。')) {
                return;
            }
            
            try {
                localStorage.clear();
                showToast('已清空 localStorage', 'success');
            } catch (e) {
                console.error('清除 localStorage 失败:', e);
            }
            
            try {
                sessionStorage.clear();
                showToast('已清空 sessionStorage', 'success');
            } catch (e) {
                console.error('清除 sessionStorage 失败:', e);
            }
            
            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (const registration of registrations) {
                    await registration.unregister();
                }
                showToast('已注销 Service Worker', 'success');
            } catch (e) {
                console.error('注销 Service Worker 失败:', e);
            }
            
            try {
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (const cacheName of cacheNames) {
                        await caches.delete(cacheName);
                    }
                    showToast('已清空缓存存储', 'success');
                }
            } catch (e) {
                console.error('清除缓存存储失败:', e);
            }
            
            try {
                const databases = await indexedDB.databases();
                for (const db of databases) {
                    indexedDB.deleteDatabase(db.name);
                }
                showToast('已清空 IndexedDB', 'success');
            } catch (e) {
                console.error('清除 IndexedDB 失败:', e);
            }
            
            try {
                document.cookie.split(';').forEach(cookie => {
                    const eqPos = cookie.indexOf('=');
                    const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                    document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                });
                showToast('已清空 Cookie', 'success');
            } catch (e) {
                console.error('清除 Cookie 失败:', e);
            }
            
            setTimeout(() => {
                showToast('所有站点缓存已清空，请刷新页面', 'warning');
            }, 500);
        }
    </script>
</body>
</html>
